# Example architecture experiment: official ACT plus a zero-initialized residual action head.
schema_version: 1
algorithm: act

dataset:
  repo_id: FAFU-Robotics/fafu_demo
  root: ./datasets/fafu_demo
  action_mode: joint
  urdf_path: null  # null uses the packaged FAFU URDF; set the collection URDF when customized

run:
  output_dir: ./outputs/train/fafu_act_demo_seed1000
  device: cuda
  steps: 100000
  batch_size: 8
  num_workers: 4
  seed: 1000
  save_freq: 20000
  log_freq: 200

policy:
  type: fafu_act_demo
  chunk_size: 100
  n_action_steps: 10
  optimizer_lr: 0.00001
  dropout: 0.1
  use_vae: true
  kl_weight: 10.0
  extra:
    residual_hidden_dim: 256
    residual_dropout: 0.1
    residual_scale: 0.1

evaluation:
  eval_split: 0.1
  eval_steps: 5000

tracking:
  wandb: false

hub:
  push_to_hub: false
  policy_repo_id: null
  public: false
